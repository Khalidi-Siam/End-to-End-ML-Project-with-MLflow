<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Wine Quality Prediction Web App" />
    <meta name="author" content="" />
    <title>Wine Quality Prediction</title>
    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />
    
    <!-- Font Awesome -->
    <script src="https://use.fontawesome.com/releases/v5.15.3/js/all.js" crossorigin="anonymous"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css" />
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0a0a0f;
            --card-bg: #161b2b;
            --accent-color: #3b82f6;
        }

        body {
            background-color: var(--bg-color);
            color: #e2e8f0;
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background-color: #111827 !important;
            border-bottom: 1px solid #334155;
        }

        .masthead {
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), 
                        url('static/assets/img/wine.jpg') center/cover no-repeat;
            padding: 8rem 0;
            color: white;
        }

        .site-heading h1 {
            font-family: 'Lora', serif;
            font-size: 3.5rem;
            font-weight: 700;
        }

        .form-container {
            max-width: 950px;
            margin: 40px auto;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 45px 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid #334155;
        }

        .form-container h2 {
            color: #60a5fa;
            text-align: center;
            margin-bottom: 35px;
            font-weight: 600;
        }

        .form-row-total {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 22px;
        }

        .form-row {
            flex: 1;
            min-width: 280px;
        }

        .form-row label {
            color: #94a3b8;
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
            font-size: 0.95rem;
        }

        .input-text {
            background-color: #1e2937;
            color: #e2e8f0;
            border: 2px solid #475569;
            border-radius: 10px;
            padding: 14px 16px;
            width: 100%;
            font-size: 1.05rem;
            transition: all 0.3s ease;
        }

        .input-text:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25);
            background-color: #334155;
            outline: none;
        }

        .input-text::placeholder {
            color: #64748b;
        }

        .register {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .register:hover {
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }

        footer {
            background-color: #111827;
            border-top: 1px solid #334155;
            padding: 40px 0 20px;
        }

        .social-icon {
            font-size: 1.8rem;
            color: #94a3b8;
            transition: color 0.3s;
        }

        .social-icon:hover {
            color: #60a5fa;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container px-4 px-lg-5">
            <a class="navbar-brand fw-bold" href="/">Wine Quality</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto py-4 py-lg-0">
                    <!-- Add more links if needed -->
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="masthead">
        <div class="container position-relative px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5 justify-content-center">
                <div class="col-md-10 col-lg-8 col-xl-7 text-center">
                    <div class="site-heading">
                        <h1>Wine Quality Prediction</h1>
                        <span class="subheading">Check the quality of your wine instantly</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Form -->
    <div class="container px-4 px-lg-5">
        <div class="form-container">
            <form action="/predict" method="post">
                <h2>Enter Wine Parameters</h2>

                <div class="form-row-total">
                    <div class="form-row">
                        <label for="fixed_acidity">Fixed Acidity</label>
                        <input type="text" name="fixed_acidity" id="fixed_acidity" class="input-text" placeholder="e.g. 7.4" required>
                    </div>
                    <div class="form-row">
                        <label for="volatile_acidity">Volatile Acidity</label>
                        <input type="text" name="volatile_acidity" id="volatile_acidity" class="input-text" placeholder="e.g. 0.70" required>
                    </div>
                </div>

                <div class="form-row-total">
                    <div class="form-row">
                        <label for="citric_acid">Citric Acid</label>
                        <input type="text" name="citric_acid" id="citric_acid" class="input-text" placeholder="e.g. 0.00" required>
                    </div>
                    <div class="form-row">
                        <label for="residual_sugar">Residual Sugar</label>
                        <input type="text" name="residual_sugar" id="residual_sugar" class="input-text" placeholder="e.g. 1.9" required>
                    </div>
                </div>

                <div class="form-row-total">
                    <div class="form-row">
                        <label for="chlorides">Chlorides</label>
                        <input type="text" name="chlorides" id="chlorides" class="input-text" placeholder="e.g. 0.076" required>
                    </div>
                    <div class="form-row">
                        <label for="free_sulfur_dioxide">Free Sulfur Dioxide</label>
                        <input type="text" name="free_sulfur_dioxide" id="free_sulfur_dioxide" class="input-text" placeholder="e.g. 11.0" required>
                    </div>
                </div>

                <div class="form-row-total">
                    <div class="form-row">
                        <label for="total_sulfur_dioxide">Total Sulfur Dioxide</label>
                        <input type="text" name="total_sulfur_dioxide" id="total_sulfur_dioxide" class="input-text" placeholder="e.g. 34.0" required>
                    </div>
                    <div class="form-row">
                        <label for="density">Density</label>
                        <input type="text" name="density" id="density" class="input-text" placeholder="e.g. 0.9978" required>
                    </div>
                </div>

                <div class="form-row-total">
                    <div class="form-row">
                        <label for="pH">pH</label>
                        <input type="text" name="pH" id="pH" class="input-text" placeholder="e.g. 3.51" required>
                    </div>
                    <div class="form-row">
                        <label for="sulphates">Sulphates</label>
                        <input type="text" name="sulphates" id="sulphates" class="input-text" placeholder="e.g. 0.56" required>
                    </div>
                </div>

                <div class="form-row-total">
                    <div class="form-row">
                        <label for="alcohol">Alcohol</label>
                        <input type="text" name="alcohol" id="alcohol" class="input-text" placeholder="e.g. 9.4" required>
                    </div>
                </div>

                <div class="text-center">
                    <button type="submit" class="register">Predict Quality</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center">
        <div class="container px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5 justify-content-center">
                <div class="col-md-10 col-lg-8 col-xl-7">
                    <ul class="list-inline mb-4">
                        <li class="list-inline-item">
                            <a href="https://www.linkedin.com/in/m-k-khalidi-siam/" target="_blank" class="social-icon">
                                <i class="fab fa-linkedin"></i>
                            </a>
                        </li>
                        <li class="list-inline-item">
                            <a href="https://github.com/khalidi-siam" target="_blank" class="social-icon">
                                <i class="fab fa-github"></i>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
